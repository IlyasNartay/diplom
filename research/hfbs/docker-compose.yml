version: "3.9"

# ============================================================
# High-Frequency Booking System — Docker Compose
# Запускает: PostgreSQL, Redis, Kafka + Zookeeper,
#            Django backend, FastAPI backend, Frontend
# ============================================================

services:

  # ── Databases & Brokers ────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: hfbs_postgres
    environment:
      POSTGRES_USER: hfbs
      POSTGRES_PASSWORD: hfbs_secret
      POSTGRES_DB: hfbs_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hfbs"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hfbs_redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: hfbs_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: hfbs_kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "29092:29092"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ── Backends ───────────────────────────────────────────────

  django:
    build:
      context: ./backend-django
      dockerfile: Dockerfile
    container_name: hfbs_django
    env_file: ./backend-django/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend-django:/app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  fastapi:
    build:
      context: ./backend-fastapi
      dockerfile: Dockerfile
    container_name: hfbs_fastapi
    env_file: ./backend-fastapi/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8001:8001"
    volumes:
      - ./backend-fastapi:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload

  # ── Frontend ───────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hfbs_frontend
    depends_on:
      - django
      - fastapi
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_DJANGO_URL=http://164.92.180.99:8000
      - VITE_FASTAPI_URL=http://164.92.180.99:8001

volumes:
  postgres_data:
