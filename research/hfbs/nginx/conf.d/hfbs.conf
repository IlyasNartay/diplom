# nginx/conf.d/hfbs.conf
# ══════════════════════════════════════════════════════════════
# Nginx как reverse proxy для HFBS:
#   / → Frontend (React SPA)
#   /api/v1/ (порт 80/443 default) → Django :8000
#   /async/api/v1/ → FastAPI :8001
#   /media/ → статические файлы (PDF билеты)
# Фронтенд сам переключает target через localStorage('backend')
# ══════════════════════════════════════════════════════════════

# ── HTTP → HTTPS redirect ──────────────────────────────────────
server {
    listen 80;
    server_name your-domain.com www.your-domain.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Всё остальное — редирект на HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ──────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name your-domain.com www.your-domain.com;

    # SSL сертификаты (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # Современные SSL настройки
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers   ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    # Увеличиваем лимит для загрузки файлов
    client_max_body_size 10M;

    # ── Django API (синхронный, по умолчанию) ──────────────────
    location /api/v1/ {
        proxy_pass         http://django:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;

        # CORS для API
        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization,Content-Type" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # Django Admin
    location /admin/ {
        proxy_pass       http://django:8000;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django статика (collectstatic)
    location /static/ {
        alias /var/www/django_static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # PDF билеты Django
    location /media/ {
        alias /var/www/django_media/;
        expires 1d;
    }

    # ── FastAPI (async) ─────────────────────────────────────────
    # Фронтенд обращается на /async/* когда выбран FastAPI backend
    location /async/ {
        rewrite ^/async/(.*)$ /$1 break;
        proxy_pass         http://fastapi:8001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;

        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization,Content-Type" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # FastAPI Swagger docs
    location /fastapi-docs {
        proxy_pass http://fastapi:8001/docs;
        proxy_set_header Host $host;
    }

    # ── React SPA (Frontend) ────────────────────────────────────
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;

        # SPA fallback: все незнакомые пути отдаём index.html
        proxy_intercept_errors on;
        error_page 404 = @spa_fallback;
    }

    location @spa_fallback {
        proxy_pass http://frontend:80/index.html;
    }
}

# ── Прямой доступ к Django API (для тестирования) ──────────────
# Отдельный subdomain api.your-domain.com → Django
server {
    listen 443 ssl http2;
    server_name api.your-domain.com;

    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    location / {
        proxy_pass http://django:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── FastAPI subdomain ──────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name async.your-domain.com;

    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    location / {
        proxy_pass http://fastapi:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
