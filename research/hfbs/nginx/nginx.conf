# nginx/nginx.conf — Главный конфиг Nginx
user nginx;
worker_processes auto;          # Автоопределение по CPU
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 4096;    # Максимум соединений на воркер
    use epoll;                  # Эффективный I/O на Linux
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Формат логов
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time ut=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # Оптимизации производительности
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1000;

    # Защита от slow loris атак
    client_header_timeout 10s;
    client_body_timeout   10s;
    send_timeout          10s;

    # Скрываем версию Nginx
    server_tokens off;

    include /etc/nginx/conf.d/*.conf;
}
