[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
# E: pycodestyle errors, F: pyflakes, I: isort (сортировка импортов)
select = ["E", "F", "I"]
ignore = []

[tool.mypy]
python_version = "3.11"
strict = false
disallow_untyped_defs = false
check_untyped_defs = true
disallow_any_generics = false
ignore_missing_imports = true
plugins = ["pydantic.mypy"]
exclude = ["migrations/"]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.bandit]
exclude_dirs = ["tests", "migrations"]
tests = ["B201", "B301"]
skips = ["B101"] # Пропускать assert (используется в pytest)
